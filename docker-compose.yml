services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: foxygendb
            POSTGRES_USER: grintheone
            POSTGRES_PASSWORD: gtoadmin
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data

    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio-data:/data

volumes:
    postgres-data:
    minio-data:
