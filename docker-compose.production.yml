services:
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-foxygendb}
            POSTGRES_USER: ${POSTGRES_USER:-grintheone}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grintheone} -d ${POSTGRES_DB:-foxygendb}"]
            interval: 10s
            timeout: 5s
            retries: 10

    minio:
        profiles: ["with-minio"]
        image: minio/minio:latest
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        volumes:
            - minio-data:/data

    server:
        build:
            context: .
            dockerfile: server/Dockerfile
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${POSTGRES_USER:-grintheone}
            DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
            DB_NAME: ${POSTGRES_DB:-foxygendb}
            DB_SSLMODE: ${DB_SSLMODE:-disable}
            JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
            ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-15m}
            REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-168h}
            MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
            MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
            MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
            MINIO_BUCKET: ${MINIO_BUCKET:-}
            MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
            MINIO_REGION: ${MINIO_REGION:-}
            MINIO_LOCATION: ${MINIO_LOCATION:-}
            BOOTSTRAP_IMPORT_ENABLED: ${BOOTSTRAP_IMPORT_ENABLED:-true}
            BOOTSTRAP_IMPORT_SOURCE: ${BOOTSTRAP_IMPORT_SOURCE:-/bootstrap/dump.json}
            BOOTSTRAP_IMPORT_DEFAULT_PASSWORD: ${IMPORT_DEFAULT_PASSWORD:-}
            BOOTSTRAP_IMPORT_ONLY: ${BOOTSTRAP_IMPORT_ONLY:-}
            BOOTSTRAP_DB_WAIT_TIMEOUT: ${BOOTSTRAP_DB_WAIT_TIMEOUT:-2m}
            BOOTSTRAP_DB_WAIT_INTERVAL: ${BOOTSTRAP_DB_WAIT_INTERVAL:-2s}
            BOOTSTRAP_STORAGE_WAIT_TIMEOUT: ${BOOTSTRAP_STORAGE_WAIT_TIMEOUT:-1m}
            BOOTSTRAP_STORAGE_WAIT_INTERVAL: ${BOOTSTRAP_STORAGE_WAIT_INTERVAL:-2s}
        volumes:
            - ./deploy/production/bootstrap:/bootstrap:ro
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null"]
            start_period: 5m
            interval: 15s
            timeout: 5s
            retries: 10

    client:
        build:
            context: .
            dockerfile: client/Dockerfile
        restart: unless-stopped
        depends_on:
            server:
                condition: service_healthy
        ports:
            - "${PUBLIC_HTTP_PORT:-80}:80"

volumes:
    postgres-data:
    minio-data:

networks:
    default:
        driver: bridge
        ipam:
            config:
                - subnet: ${DOCKER_NETWORK_SUBNET:-172.30.240.0/24}
