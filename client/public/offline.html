<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="theme-color" content="#050816" />
        <title>Нет подключения</title>
        <style>
            :root {
                color-scheme: dark;
                font-family: "Segoe UI", sans-serif;
                background: #020617;
                color: #f8fafc;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100dvh;
                display: grid;
                place-items: center;
                padding:
                    calc(2rem + env(safe-area-inset-top))
                    1.5rem
                    calc(2rem + env(safe-area-inset-bottom));
                background:
                    radial-gradient(circle at top, rgba(106, 59, 242, 0.28), transparent 42%),
                    linear-gradient(160deg, #020617 0%, #0f172a 55%, #1e1b4b 100%);
            }

            main {
                width: min(100%, 28rem);
                padding: 1.5rem;
                border: 1px solid rgba(148, 163, 184, 0.2);
                border-radius: 1.5rem;
                background: rgba(15, 23, 42, 0.86);
                box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
            }

            h1 {
                margin: 0 0 0.75rem;
                font-size: 1.5rem;
            }

            p {
                margin: 0;
                line-height: 1.6;
                color: #cbd5e1;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Нет подключения</h1>
            <p>Приложение установлено и откроется снова, как только устройство вернется в сеть. Уже сохраненные экраны можно открыть повторно после обновления соединения.</p>
        </main>
    </body>
</html>
